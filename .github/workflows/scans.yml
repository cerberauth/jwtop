name: Scans

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  GO_VERSION: "1.26"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  run-exploit-cli:
    name: Exploit CLI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup Go environment
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Create test token
        id: create
        run: echo "jwt=$(go run main.go create --alg HS256 --secret testsecret --sqa-opt-out)" >> $GITHUB_OUTPUT

      - name: Exploit algnone
        run: go run main.go exploit algnone ${{ steps.create.outputs.jwt }} --sqa-opt-out

      - name: Exploit algnone --all
        run: go run main.go exploit algnone --all ${{ steps.create.outputs.jwt }} --sqa-opt-out

      - name: Exploit blanksecret
        run: go run main.go exploit blanksecret ${{ steps.create.outputs.jwt }} --sqa-opt-out

      - name: Exploit nullsig
        run: go run main.go exploit nullsig ${{ steps.create.outputs.jwt }} --sqa-opt-out

      - name: Exploit weak / known secret
        run: go run main.go exploit weaksecret --secret testsecret ${{ steps.create.outputs.jwt }} --sqa-opt-out

      - name: Generate RSA key pair
        run: |
          openssl genrsa -out private_key.pem 2048
          openssl rsa -in private_key.pem -pubout -out public_key.pem

      - name: Create RS256 test token
        id: create-rsa
        run: echo "jwt=$(go run main.go create --alg RS256 --key private_key.pem --sqa-opt-out)" >> $GITHUB_OUTPUT

      - name: Exploit hmacconfusion
        run: go run main.go exploit hmacconfusion ${{ steps.create-rsa.outputs.jwt }} --key public_key.pem --sqa-opt-out

      - name: Generate EC key pair
        run: |
          openssl ecparam -name prime256v1 -genkey -noout -out ec_private_key.pem
          openssl ec -in ec_private_key.pem -pubout -out ec_public_key.pem

      - name: Create ES256 test token
        id: create-es256
        run: echo "jwt=$(go run main.go create --alg ES256 --key ec_private_key.pem --sqa-opt-out)" >> $GITHUB_OUTPUT

      - name: Exploit psychicsig
        run: go run main.go exploit psychicsig ${{ steps.create-es256.outputs.jwt }} --sqa-opt-out

  run-jwt-crack-offline:
    name: JWT Crack - Offline Mode
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup Go environment
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Create weak-secret token
        id: create-weak
        run: echo "jwt=$(go run main.go create --alg HS256 --secret testsecret --sqa-opt-out)" >> $GITHUB_OUTPUT

      - name: Offline crack - weak secret
        run: go run main.go crack ${{ steps.create-weak.outputs.jwt }} --secret testsecret --sqa-opt-out

      - name: Create blank-secret token
        id: create-blank
        run: echo "jwt=$(go run main.go create --alg HS256 --secret '' --sqa-opt-out)" >> $GITHUB_OUTPUT

      - name: Offline crack - blank secret
        run: go run main.go crack ${{ steps.create-blank.outputs.jwt }} --sqa-opt-out

  run-jwt-crack-scans:
    name: JWT Crack - ${{ matrix.challenge }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - challenge: "jwt-alg-none-bypass"
          - challenge: "jwt-blank-secret"
          - challenge: "jwt-kid-path-traversal"
            crack_args: "--kid-path /dev/null"
          - challenge: "jwt-kid-sql-injection"
            crack_args: "--kid-sql-table keys"
          - challenge: "jwt-not-verified"
          - challenge: "jwt-null-signature"
          - challenge: "jwt-psychic-signature"
          - challenge: "jwt-weak-hmac-secret"

    steps:
      - uses: actions/checkout@v7

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Server
        run: docker run -d -p 8080:8080 ghcr.io/cerberauth/api-vulns-challenges/${{ matrix.challenge }}:latest

      - name: Get JWT
        id: get-jwt
        run: echo "jwt=$(docker run --rm ghcr.io/cerberauth/api-vulns-challenges/${{ matrix.challenge }}:latest jwt)" >> $GITHUB_OUTPUT

      - name: Setup Go environment
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: jwtop crack
        id: crack
        continue-on-error: true
        run: |
          go run main.go crack ${{ steps.get-jwt.outputs.jwt }} --url http://localhost:8080 ${{ matrix.crack_args }} --sqa-opt-out

      - name: Check for working exploit
        if: ${{ steps.crack.outputs.conclusion == 'failure' }}
        run: echo "No working exploit found for ${{ matrix.challenge }}"

      - name: Stop Server
        if: ${{ always() }}
        run: docker stop $(docker ps -q --filter ancestor=ghcr.io/cerberauth/api-vulns-challenges/${{ matrix.challenge }}:latest)

  run-jwt-hmac-confusion-scan:
    name: JWT Crack - jwt-hmac-confusion
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Server
        run: docker run -d -p 8080:8080 ghcr.io/cerberauth/api-vulns-challenges/jwt-hmac-confusion:latest

      - name: Get JWT
        id: get-jwt
        run: echo "jwt=$(docker run --rm ghcr.io/cerberauth/api-vulns-challenges/jwt-hmac-confusion:latest jwt)" >> $GITHUB_OUTPUT

      - name: Setup Go environment
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: jwtop crack
        id: crack
        continue-on-error: true
        run: |
          go run main.go crack ${{ steps.get-jwt.outputs.jwt }} --url http://localhost:8080 --key http://localhost:8080/public-key --sqa-opt-out

      - name: Check for working exploit
        if: ${{ steps.crack.outputs.conclusion == 'failure' }}
        run: echo "No working exploit found for jwt-hmac-confusion"

      - name: Stop Server
        if: ${{ always() }}
        run: docker stop $(docker ps -q --filter ancestor=ghcr.io/cerberauth/api-vulns-challenges/jwt-hmac-confusion:latest)
