# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=jcroql
version: 2

project_name: jwtop

before:
  hooks:
    - go mod tidy
    - go generate ./...

snapshot:
  version_template: "{{ incpatch .Version }}-next"

gomod:
  proxy: true

report_sizes: true

metadata:
  mod_timestamp: "{{ .CommitTimestamp }}"

builds:
  - id: jwtop
    binary: jwtop
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
      - arm
      - "386"
    goarm:
      - "7"
    ignore:
      - goos: windows
        goarch: arm64
      - goos: windows
        goarch: arm
      - goos: darwin
        goarch: "386"
      - goos: darwin
        goarch: arm
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{ .CommitDate }}

universal_binaries:
  - id: jwtop-universal
    ids:
      - jwtop
    replace: true

checksum:
  name_template: "checksums.txt"

source:
  enabled: true

archives:
  - name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    formats: ["tar.gz"]
    format_overrides:
      - goos: windows
        formats: ["zip"]
    builds_info:
      group: root
      owner: root
      mtime: "{{ .CommitDate }}"
    files:
      - README.md
      - LICENSE

sboms:
  - artifacts: archive

signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    output: true
    artifacts: checksum
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - --yes

changelog:
  sort: asc
  use: github
  format: "{{ .SHA }}: {{ .Message }}{{ if .Logins }} ({{ .Logins | englishJoin }}){{ end }}"
  groups:
    - title: "New Features"
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: "Bug Fixes"
      regexp: '^.*?(fix|refactor)(\(.+\))??!?:.+$'
      order: 1
    - title: "Other"
      order: 999
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore\(deps\): '
      - '^(build|ci): '
      - Merge pull request
      - Merge branch

milestones:
  - close: true

release:
  name_template: "v{{ .Version }}"

homebrew_casks:
  - name: jwtop
    description: &description "JWT operations CLI - decode, verify, create, sign, and exploit JWTs."
    license: &license MIT
    homepage: &homepage https://github.com/cerberauth/jwtop
    repository:
      owner: &owner cerberauth
      name: homebrew-tap
      branch: &main main
    commit_author: &commit_author
      name: cerberauth-bot
      email: 268418261+cerberauth-bot@users.noreply.github.com

scoops:
  - name: jwtop
    description: *description
    homepage: *homepage
    license: *license
    repository:
      owner: *owner
      name: scoop-bucket
      branch: *main
    commit_author: *commit_author

nfpms:
  - file_name_template: "{{ .ConventionalFileName }}"
    package_name: jwtop
    vendor: CerberAuth
    homepage: *homepage
    maintainer: Emmanuel Gautier <emmanuel@cerberauth.com>
    description: *description
    license: *license
    bindir: /usr/bin
    section: utils
    formats:
      - apk
      - deb
      - rpm
      - termux.deb
      - archlinux

snapcrafts:
  - name_template: "{{ .ProjectName }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}"
    title: jwtop
    publish: true
    summary: *description
    description: "JWTop is a command-line tool for decoding, verifying, creating, and signing JWTs."
    license: *license
    confinement: strict
    grade: stable
    apps:
      jwtop:
        plugs:
          - home
          - network
          - removable-media
    channel_templates:
      - edge
      - beta
      - candidate
      - stable

aurs:
  - name: jwtop-bin
    homepage: *homepage
    description: *description
    maintainers:
      - Emmanuel Gautier <emmanuel@cerberauth.com>
    license: *license
    private_key: "{{ .Env.AUR_KEY }}"
    git_url: ssh://aur@aur.archlinux.org/jwtop-bin.git
    skip_upload: auto
    package: |-
      install -Dm755 "./jwtop" "${pkgdir}/usr/bin/jwtop"
      install -Dm644 "./LICENSE" "${pkgdir}/usr/share/licenses/jwtop/LICENSE"

winget:
  - name: jwtop
    publisher: CerberAuth
    publisher_url: https://www.cerberauth.com
    license: *license
    license_url: https://github.com/cerberauth/jwtop/blob/main/LICENSE
    homepage: *homepage
    short_description: *description
    repository:
      owner: *owner
      name: winget-pkgs
      branch: "jwtop-{{.Version}}"

chocolateys:
  - name: jwtop
    title: JWTop
    owners: CerberAuth
    authors: CerberAuth
    description: *description
    project_url: *homepage
    license_url: https://github.com/cerberauth/jwtop/blob/main/LICENSE
    copyright: CerberAuth
    tags: "jwt security developer"
    summary: *description
    api_key: "{{ .Env.CHOCOLATEY_API_KEY }}"
    source_repo: https://push.chocolatey.org/
    skip_publish: false

dockers_v2:
  - id: jwtop-dockerhub
    dockerfile: .docker/Dockerfile-goreleaser
    images:
      - "cerberauth/jwtop"
    tags:
      - "{{ .Tag }}"
      - "v{{ .Major }}"
      - "v{{ .Major }}.{{ .Minor }}"
      - "latest"
    platforms:
      - linux/amd64
      - linux/arm64
      - linux/arm/v7

  - id: jwtop-ghcr
    dockerfile: .docker/Dockerfile-goreleaser
    images:
      - "ghcr.io/cerberauth/jwtop"
    tags:
      - "{{ .Tag }}"
      - "v{{ .Major }}"
      - "v{{ .Major }}.{{ .Minor }}"
      - "latest"
    platforms:
      - linux/amd64
      - linux/arm64
      - linux/arm/v7

docker_signs:
  - cmd: cosign
    artifacts: manifests
    output: true
    args:
      - "sign"
      - "${artifact}@${digest}"
      - "--yes"
